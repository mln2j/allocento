<header class="w-full h-[65px] bg-white border-b border-slate-100 sticky top-0 z-40 select-none">
  <div class="max-w-7xl mx-auto w-full h-full flex flex-row items-center justify-between px-6 md:px-8">

    <a routerLink="/dashboard" (click)="onBrandClick()" class="flex items-center gap-3 group focus:outline-none">
      <div class="w-8 h-8 flex items-center justify-center">
        <img src="logo/logo.svg" alt="Allocento Logo" class="w-full h-full object-contain">
      </div>
      <span class="text-brand-purple font-bold text-xl tracking-tighter" style="font-family: 'Space Mono', monospace;">
        Allocento
      </span>
      <span *ngIf="!isOnline" class="bg-amber-100 text-amber-800 text-[10px] font-bold px-2 py-0.5 rounded-full font-mono uppercase tracking-wider select-none">
        offline
      </span>
    </a>

    <button
      (click)="onNotificationTrigger()"
      [disabled]="!isOnline"
      type="button"
      class="notification-trigger relative p-2 text-slate-400 hover:text-brand-purple transition-colors disabled:opacity-30 focus:outline-none"
      aria-label="Otvori obavijesti"
    >
      <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
      </svg>
      <span *ngIf="notificationCount > 0" class="absolute top-1 right-1 bg-brand-purple text-white text-[9px] font-bold w-4 h-4 rounded-full flex items-center justify-center shadow-sm">
        {{ notificationCount }}
      </span>
    </button>

  </div>
</header>
