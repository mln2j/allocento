<div *ngIf="!isHidden()" class="fixed bottom-6 left-0 right-0 w-full z-60 pointer-events-none flex justify-center animate-in slide-in-from-bottom-10 fade-in duration-300">

  <nav class="pointer-events-auto w-[343px] h-14 bg-white rounded-full shadow-[0_10px_25px_rgba(15,23,42,0.08)] border border-slate-200/60 flex items-center relative select-none overflow-hidden">

    <div
      class="absolute h-full top-0 flex items-center justify-center transition-all duration-300 ease-[cubic-bezier(0.25,1,0.5,1)]"
      [style.width.%]="100 / navItems().length"
      [style.transform]="'translateX(' + (activeIndex() * 100) + '%)'"
    >
      <div class="w-4/5 h-10 bg-brand-purple/10 rounded-full"></div>
    </div>

    @for (item of navItems(); track item.path; let i = $index) {
      <a
        [routerLink]="item.path"
        class="flex-1 flex items-center justify-center h-full relative z-10 outline-none transition-colors duration-200 group"
        [ngClass]="isActive(item.path) ? 'text-brand-purple' : 'text-slate-400 hover:text-slate-600'"
        [attr.aria-label]="t(getTranslationKey(item))"
        (click)="activeIndex.set(i)"
      >

        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="2"
          stroke="currentColor"
          class="w-5 h-5"
        >
          <path stroke-linecap="round" stroke-linejoin="round" [attr.d]="item.iconPath" />
        </svg>

        <span class="absolute -top-10 bg-slate-900 text-white text-[10px] font-mono px-2.5 py-1 rounded-md opacity-0 translate-y-2 group-hover:opacity-100 group-hover:translate-y-0 transition-all duration-200 pointer-events-none whitespace-nowrap shadow-md">
          {{ t(getTranslationKey(item)) }}
        </span>

      </a>
    }

  </nav>
</div>
