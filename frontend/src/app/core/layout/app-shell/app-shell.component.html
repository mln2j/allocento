<mat-sidenav-container class="app-shell">
  <mat-sidenav
    #sidenav
    mode="over"
    class="app-sidenav">
    <div class="sidenav-wrapper">
      <mat-nav-list class="main-nav">
        <a
          mat-list-item
          routerLink="/dashboard"
          routerLinkActive="active"
          (click)="sidenav.close()">
          <mat-icon>dashboard</mat-icon>
          <span>Dashboard</span>
        </a>

        <a
          mat-list-item
          routerLink="/accounts"
          routerLinkActive="active"
          (click)="sidenav.close()">
          <mat-icon>account_balance_wallet</mat-icon>
          <span>Accounts</span>
        </a>

        <a
          mat-list-item
          routerLink="/transactions"
          routerLinkActive="active"
          (click)="sidenav.close()">
          <mat-icon>receipt_long</mat-icon>
          <span>Transactions</span>
        </a>

        <a
          mat-list-item
          routerLink="/household"
          routerLinkActive="active"
          (click)="sidenav.close()">
          <mat-icon>home</mat-icon>
          <span>Household</span>
        </a>

        <a
          mat-list-item
          routerLink="/organization"
          routerLinkActive="active"
          (click)="sidenav.close()">
          <mat-icon>business</mat-icon>
          <span>Organization</span>
        </a>
      </mat-nav-list>
      <div class="sidenav-footer">
        <mat-divider></mat-divider>
      </div>
    </div>
  </mat-sidenav>

  <mat-sidenav-content>
    <mat-toolbar color="primary" class="app-toolbar">
      <button mat-icon-button class="menu-button" (click)="sidenav.open()">
        <mat-icon>menu</mat-icon>
      </button>

      <span class="toolbar-title">{{ pageTitle }}</span>
      <span class="spacer"></span>

      <button mat-icon-button (click)="openNotifications()" class="notifications-button">
        <mat-icon [aria-hidden]="false" [matBadge]="pendingInvitations.length"
                  [matBadgeHidden]="pendingInvitations.length === 0"
                  matBadgeColor="warn">
          notifications
        </mat-icon>
      </button>

      <button mat-icon-button routerLink="/profile" class="profile-button">
        @if (user?.profile_photo_url) {
          <img [src]="user?.profile_photo_url" alt="Profile" class="toolbar-avatar">
        } @else {
          <mat-icon>account_circle</mat-icon>
        }
      </button>
    </mat-toolbar>

    <main class="app-main">
      @if (loadingService.loading()) {
        <div class="loading-overlay">
          <mat-spinner diameter="50"></mat-spinner>
        </div>
      }
      <router-outlet></router-outlet>

      <nav class="bottom-nav" aria-label="primary">
        <a routerLink="/dashboard" routerLinkActive="active" class="bn-item"><mat-icon>dashboard</mat-icon><span>Dashboard</span></a>
        <a routerLink="/accounts" routerLinkActive="active" class="bn-item"><mat-icon>account_balance_wallet</mat-icon><span>Accounts</span></a>
        <a routerLink="/transactions" routerLinkActive="active" class="bn-item"><mat-icon>receipt_long</mat-icon><span>Transactions</span></a>
        <a routerLink="/household" routerLinkActive="active" class="bn-item"><mat-icon>home</mat-icon><span>Household</span></a>
        <a routerLink="/organization" routerLinkActive="active" class="bn-item"><mat-icon>business</mat-icon><span>Organization</span></a>
      </nav>
    </main>
  </mat-sidenav-content>
</mat-sidenav-container>
