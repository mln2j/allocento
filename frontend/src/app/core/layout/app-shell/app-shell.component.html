<div class="min-h-screen bg-slate-50 relative flex flex-col">

  <app-header
    class="fixed top-0 w-full z-60 bg-slate-50 border-b border-slate-100"
    [isOnline]="appInitializer.isOnlineMode"
    [notificationCount]="pendingInvitations.length"
    (notificationClick)="toggleNotifications()">
  </app-header>

  <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-6 mt-16 mb-16">
    <router-outlet />
  </main>

  <!-- Global full-screen loading overlay (z-50, below nav z-60 and header z-60) -->
  <app-global-loading />

  <app-bottom-nav class="pointer-events-none" />


  <app-modal
    [isOpen]="isNotificationsOpen"
    [title]="t('notifications.title')"
    (close)="toggleNotifications()"
  >
    <div class="space-y-3">
      <div *ngIf="pendingInvitations.length === 0" class="text-center py-8 flex flex-col items-center justify-center">
        <p class="text-sm font-medium text-slate-500">{{ t('notifications.empty') }}</p>
      </div>
      <div *ngFor="let invite of pendingInvitations" class="p-4 bg-white border border-slate-100 rounded-xl shadow-sm flex flex-col gap-3">
        <div class="flex items-start gap-3">
          <div class="w-8 h-8 rounded-lg bg-brand-purple/10 text-brand-purple flex items-center justify-center font-bold text-sm flex-shrink-0">
            {{ (invite.workspace?.name || 'W')[0].toUpperCase() }}
          </div>
          <div class="truncate flex-1">
            <h4 class="text-sm font-bold text-slate-800 truncate leading-tight">{{ invite.workspace?.name || 'Workspace' }}</h4>
            <p class="text-xs text-slate-400 truncate mt-0.5 font-mono">Šalje: <span class="text-slate-600 font-sans font-medium">{{ invite.inviter?.name }}</span></p>
          </div>
        </div>
        <div class="flex items-center gap-2 w-full pt-1">
          <button (click)="respondToInvitation(invite.id, false)" class="flex-1 bg-slate-50 text-slate-600 text-xs font-semibold py-2 rounded-lg hover:bg-slate-100 transition-colors border border-slate-200/60">
            {{ t('common.reject') }}
          </button>
          <button (click)="respondToInvitation(invite.id, true)" class="flex-1 bg-brand-purple text-white text-xs font-semibold py-2 rounded-lg hover:bg-opacity-90 transition-all shadow-sm">
            {{ t('common.accept') }}
          </button>
        </div>
      </div>
    </div>
  </app-modal>

  <!-- Toast Notifications Container -->
  <div class="fixed top-20 right-4 z-110 flex flex-col gap-2 w-full max-w-xs pointer-events-none px-4 md:px-0">
    <div
      *ngFor="let toast of toastService.toasts()"
      class="p-4 rounded-xl shadow-lg border border-slate-100 flex items-center justify-between gap-3 bg-white pointer-events-auto animate-in slide-in-from-right-5 duration-200"
    >
      <div class="flex items-center gap-3">
        <span *ngIf="toast.type === 'success'" class="text-green-500 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </span>
        <span *ngIf="toast.type === 'error'" class="text-red-500 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </span>
        <span *ngIf="toast.type === 'warning'" class="text-amber-500 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
          </svg>
        </span>
        <span *ngIf="toast.type === 'info'" class="text-blue-500 flex-shrink-0">
          <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
          </svg>
        </span>
        <span class="text-xs font-bold font-mono text-slate-700 leading-snug">{{ toast.message }}</span>
      </div>
      <button (click)="toastService.dismiss(toast.id)" class="text-slate-400 hover:text-slate-600 transition-colors outline-none cursor-pointer p-0.5 flex-shrink-0">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
        </svg>
      </button>
    </div>
  </div>

</div>
