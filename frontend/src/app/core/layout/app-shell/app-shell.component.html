<div class="min-h-screen bg-slate-50 text-slate-900 flex flex-col font-sans antialiased overflow-x-hidden">

  <app-header
    [isOnline]="appInitializer.isOnlineMode"
    [notificationCount]="pendingInvitations.length"
    (notificationClick)="toggleNotifications()">
  </app-header>

  <main class="flex-1 w-full max-w-7xl mx-auto px-4 py-6 md:px-8 pb-28 md:pb-8 flex flex-col relative">

    <div class="mb-6">
      <h1 class="text-2xl font-bold tracking-tight text-slate-900" style="font-family: 'Space Mono', monospace;">
        {{ pageTitle }}
      </h1>
    </div>

    <div class="flex-1 relative min-h-[50vh]">
      <router-outlet/>

      <app-global-loading/>
    </div>

  </main>

  <app-bottom-nav></app-bottom-nav>

  <div *ngIf="isNotificationsOpen" class="fixed inset-0 bg-slate-900/30 backdrop-blur-md z-50 flex items-center justify-center p-4">
    <div class="modal-content bg-white rounded-2xl w-full max-w-md shadow-2xl border border-slate-100 flex flex-col max-h-[80vh] overflow-hidden">
      <div class="p-4 border-b border-slate-50 flex items-center justify-between bg-slate-50/50">
        <div class="flex items-center gap-2">
          <div class="w-2 h-2 rounded-full bg-brand-purple animate-pulse"></div>
          <h3 class="font-bold text-base text-slate-800 font-mono tracking-tight">{{ t('notifications.title') }}</h3>
        </div>
        <button (click)="toggleNotifications()" class="text-slate-400 hover:text-slate-600 p-1.5 rounded-xl hover:bg-slate-100 transition-colors outline-none">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12"/></svg>
        </button>
      </div>
      <div class="p-4 overflow-y-auto flex-1 space-y-3 bg-white">
        <div *ngIf="pendingInvitations.length === 0" class="text-center py-12 flex flex-col items-center justify-center">
          <p class="text-sm font-medium text-slate-500">{{ t('notifications.empty') }}</p>
        </div>
        <div *ngFor="let invite of pendingInvitations" class="p-4 bg-white border border-slate-100 rounded-xl shadow-sm flex flex-col gap-3">
          <div class="flex items-start gap-3">
            <div class="w-8 h-8 rounded-lg bg-brand-purple/10 text-brand-purple flex items-center justify-center font-bold text-sm flex-shrink-0">
              {{ (invite.workspace?.name || 'W')[0].toUpperCase() }}
            </div>
            <div class="truncate flex-1">
              <h4 class="text-sm font-bold text-slate-800 truncate leading-tight">{{ invite.workspace?.name || 'Workspace' }}</h4>
              <p class="text-xs text-slate-400 truncate mt-0.5 font-mono">Šalje: <span class="text-slate-600 font-sans font-medium">{{ invite.inviter?.name }}</span></p>
            </div>
          </div>
          <div class="flex items-center gap-2 w-full pt-1">
            <button (click)="respondToInvitation(invite.id, false)" class="flex-1 bg-slate-50 text-slate-600 text-xs font-semibold py-2 rounded-lg hover:bg-slate-100 transition-colors border border-slate-200/60">
              {{ t('common.reject') }}
            </button>
            <button (click)="respondToInvitation(invite.id, true)" class="flex-1 bg-brand-purple text-white text-xs font-semibold py-2 rounded-lg hover:bg-opacity-90 transition-all shadow-sm">
              {{ t('common.accept') }}
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

</div>
