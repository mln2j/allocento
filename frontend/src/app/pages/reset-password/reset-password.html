<div class="fixed inset-0 flex flex-col items-center justify-center bg-brand-mint p-6">
  <div class="w-full max-w-sm flex flex-col items-center opacity-100 translate-y-0 transition-all duration-700 ease-out">
    <div class="text-center mb-10">
      <div class="w-30 h-30 mx-auto flex items-center justify-center mb-4">
        <img src="logo/white-logo.svg" alt="Allocento Logo" class="w-full h-full">
      </div>
      <h1 class="text-brand-purple text-3xl font-bold tracking-tighter" style="font-family: 'Space Mono', monospace;">
        Nova Lozinka
      </h1>
      <p class="text-brand-purple/80 text-sm mt-2" style="font-family: 'Space Mono', monospace;">
        Upiši svoju novu lozinku (najmanje 6 znakova).
      </p>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="w-full space-y-4">
      <div>
        <input
          formControlName="password"
          type="password"
          name="password"
          placeholder="Nova Lozinka"
          class="w-full p-4 rounded-xl border-2 border-white/50 bg-white placeholder:text-brand-purple/60 text-brand-purple focus:border-brand-purple outline-none transition-all"
          style="font-family: 'Space Mono', monospace;"
        />
      </div>

      <div *ngIf="errorMessage()" class="text-red-600 text-sm font-bold text-center">
        {{ errorMessage() }}
      </div>

      <div *ngIf="successMessage()" class="text-green-600 text-sm font-bold text-center">
        {{ successMessage() }}
      </div>

      <button
        [disabled]="form.invalid || loading() || !token || !email"
        class="w-full py-4 bg-brand-purple hover:bg-[#4a1772] text-white rounded-xl font-bold text-lg shadow-xl shadow-brand-purple/20 transition-all duration-200 disabled:opacity-50"
        style="font-family: 'Space Mono', monospace;">
        {{ loading() ? 'Spremam...' : 'Spremi Lozinku' }}
      </button>
    </form>
  </div>
</div>
