<div class="w-full space-y-6">

  <!-- Header & Primary Action -->
  <header class="flex flex-col md:flex-row md:justify-between md:items-end gap-4 pb-4 border-b border-slate-100">
    <div>
      <h1 class="text-xs font-bold font-mono text-slate-400 uppercase tracking-wider mb-1">
        {{ t('accounts.totalBalance') }}
      </h1>
      <div class="text-3xl font-bold font-mono text-slate-900">
        {{ formatAmount(totalLiquidBalance()) }} <span class="text-slate-400 text-lg">EUR</span>
      </div>
    </div>
    
    <div class="flex flex-col gap-2 w-full md:w-auto">
      <button 
        [disabled]="!isOnline()"
        (click)="openCreateModal()"
        class="bg-brand-purple hover:bg-[#4a1772] text-white font-bold font-mono text-sm rounded-xl h-11 px-6 flex items-center justify-center gap-2 transition-all cursor-pointer outline-none shadow-md disabled:opacity-50 disabled:cursor-not-allowed w-full md:w-auto"
      >
        <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
        {{ t('accounts.addBtn') }}
      </button>
      <span *ngIf="!isOnline()" class="text-[10px] font-bold font-mono text-amber-600 text-center md:text-right bg-amber-50 px-2 py-1 rounded-lg">
        {{ t('accounts.offlineNotice') }}
      </span>
    </div>
  </header>

  <!-- Accounts Bento Grid -->
  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">

    <!-- Account Card -->
    <div 
      *ngFor="let acc of accounts()"
      (click)="isOnline() ? openEditModal(acc) : null"
      [class.cursor-pointer]="isOnline()"
      class="bg-white border border-slate-200/60 rounded-2xl p-6 shadow-[0_10px_25px_rgba(15,23,42,0.03)] flex flex-col justify-between min-h-[190px] relative overflow-hidden group transition-all duration-200"
    >
      <!-- Decorative Orb -->
      <div class="absolute -right-8 -top-8 w-24 h-24 bg-brand-purple/5 rounded-full blur-xl group-hover:bg-brand-purple/10 transition-colors duration-500 pointer-events-none"></div>

      <div class="flex justify-between items-start relative z-10">
        <div class="flex items-start gap-3">
          <!-- Icon depending on type -->
          <div class="h-10 w-10 rounded-full bg-slate-50 border border-slate-100 flex items-center justify-center text-slate-500 flex-shrink-0">
            <svg *ngIf="acc.type === 'checking'" class="w-5 h-5 text-brand-purple" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M2.25 8.25h19.5M2.25 9h19.5m-16.5 5.25h6m-6 2.25h3m-3.75 3h15a2.25 2.25 0 002.25-2.25V6.75A2.25 2.25 0 0019.5 4.5h-15a2.25 2.25 0 00-2.25 2.25v10.5A2.25 2.25 0 004.5 19.5z"/>
            </svg>
            <svg *ngIf="acc.type === 'savings'" class="w-5 h-5 text-green-600" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
            </svg>
            <svg *ngIf="acc.type !== 'checking' && acc.type !== 'savings'" class="w-5 h-5 text-slate-500" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0zM12 9v2m0 4h.01"/>
            </svg>
          </div>
          
          <div>
            <h2 class="font-bold text-sm text-slate-800 tracking-tight flex items-center gap-1.5">
              {{ acc.name }}
              <!-- Primary Indicator Star -->
              <button 
                *ngIf="isOnline()"
                (click)="setAsPrimary(acc, $event)"
                type="button"
                class="hover:scale-110 active:scale-95 transition-transform cursor-pointer outline-none"
                title="Set as primary"
              >
                <svg 
                  class="w-4.5 h-4.5"
                  [ngClass]="acc.is_primary ? 'text-amber-400 fill-amber-400' : 'text-slate-300 hover:text-amber-400'"
                  fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"
                >
                  <path stroke-linecap="round" stroke-linejoin="round" d="M11.48 3.499c.174-.297.643-.297.817 0l3.042 5.176 5.829.414c.338.024.474.437.214.656l-4.331 3.636 1.341 5.679c.078.33-.275.586-.566.402l-5.029-3.182-5.029 3.182c-.291.184-.644-.072-.566-.402l1.341-5.679-4.33-3.636c-.26-.219-.124-.632.214-.656l5.829-.414 3.042-5.176z"/>
                </svg>
              </button>
              <svg 
                *ngIf="!isOnline() && acc.is_primary"
                class="w-4 h-4 text-amber-400 fill-amber-400"
                viewBox="0 0 24 24"
              >
                <path d="M11.48 3.499c.174-.297.643-.297.817 0l3.042 5.176 5.829.414c.338.024.474.437.214.656l-4.331 3.636 1.341 5.679c.078.33-.275.586-.566.402l-5.029-3.182-5.029 3.182c-.291.184-.644-.072-.566-.402l1.341-5.679-4.33-3.636c-.26-.219-.124-.632.214-.656l5.829-.414 3.042-5.176z"/>
              </svg>
            </h2>
            <div class="font-mono text-[10px] text-slate-400 tracking-wider mt-1">•••• {{ acc.id + 1000 }}</div>
          </div>
        </div>
        
        <div class="flex items-center gap-2">
          <span class="inline-block px-2.5 py-0.5 text-[10px] font-bold font-mono uppercase tracking-wider rounded bg-slate-100 text-slate-500">
            {{ acc.currency }}
          </span>
          <button 
            *ngIf="isOnline()"
            (click)="deleteAccount(acc, $event)"
            type="button" 
            class="p-1 hover:text-red-500 text-slate-300 transition-colors cursor-pointer outline-none"
            title="Delete account"
          >
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 8.25l-7.5 7.5-7.5-7.5m-3-1.5h15m-13.5-3h12a1.5 1.5 0 011.5 1.5v12a1.5 1.5 0 01-1.5 1.5h-12a1.5 1.5 0 01-1.5-1.5v-12a1.5 1.5 0 011.5-1.5z"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="relative z-10 mt-6">
        <div class="font-mono text-2xl font-bold text-slate-900">
          {{ formatAmount(acc.balance) }} <span class="text-xs font-normal text-slate-400">{{ acc.currency }}</span>
        </div>
      </div>
    </div>

    <!-- Empty State / Add Account Card -->
    <button 
      *ngIf="isOnline()"
      (click)="openCreateModal()"
      class="bg-slate-50/50 border border-dashed border-slate-200 rounded-2xl p-6 flex flex-col items-center justify-center min-h-[190px] hover:bg-slate-50 hover:border-brand-purple/30 transition-all group cursor-pointer outline-none"
    >
      <div class="h-10 w-10 rounded-full bg-slate-100 flex items-center justify-center text-slate-400 group-hover:text-brand-purple transition-colors mb-3">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
        </svg>
      </div>
      <div class="font-mono text-xs font-bold text-slate-500 group-hover:text-brand-purple transition-colors">
        {{ t('accounts.openNew') }}
      </div>
    </button>
  </div>

  <!-- Add/Edit Modal (Reusable app-modal Component) -->
  <app-modal
    [isOpen]="isModalOpen"
    [title]="editingAccountId ? t('accounts.editTitle') : t('accounts.addTitle')"
    (close)="closeModal()"
    icon="🚀"
  >
    <form [formGroup]="accountForm" (ngSubmit)="saveAccount()" class="space-y-4">
      
      <!-- Name Input -->
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('accounts.nameLabel') }}</label>
        <input 
          type="text" 
          formControlName="name" 
          class="input-field font-mono text-sm"
          placeholder="e.g. Daily checking"
        />
      </div>

      <!-- Type Selector Dropdown -->
      <div class="relative space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('accounts.typeLabel') }}</label>
        
        <button 
          type="button"
          (click)="toggleTypeDropdown(); $event.stopPropagation()"
          class="w-full flex items-center justify-between px-3 h-11 bg-slate-50 border border-slate-200 hover:border-brand-purple/40 rounded-xl text-sm font-mono text-slate-700 transition-all cursor-pointer outline-none shadow-xs"
        >
          <span class="uppercase">{{ accountForm.get('type')?.value }}</span>
          <svg 
            class="w-3.5 h-3.5 text-slate-400 transition-transform duration-200"
            [class.rotate-180]="isTypeDropdownOpen"
            fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"
          >
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <div 
          *ngIf="isTypeDropdownOpen"
          class="absolute z-50 w-full mt-2 bg-white border border-slate-200 rounded-xl shadow-xl p-1 animate-in fade-in zoom-in-95 duration-100"
        >
          <button 
            type="button" 
            *ngFor="let t of accountTypes"
            (click)="selectType(t)" 
            class="w-full text-left px-3 py-2 text-sm font-mono text-slate-700 hover:bg-slate-50 rounded-lg transition-colors cursor-pointer"
          >
            {{ t | uppercase }}
          </button>
        </div>
      </div>

      <!-- Currency -->
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('accounts.currencyLabel') }}</label>
        <input 
          type="text" 
          formControlName="currency" 
          class="input-field font-mono text-sm"
          placeholder="e.g. EUR"
          maxlength="3"
        />
      </div>

      <!-- Balance / Opening Balance -->
      <div class="space-y-1">
        <label class="block text-[10px] font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('accounts.balanceLabel') }}</label>
        <input 
          type="number" 
          formControlName="balance" 
          class="input-field font-mono text-sm"
          placeholder="e.g. 0.00"
        />
      </div>

      <!-- Action Buttons -->
      <button 
        type="submit" 
        [disabled]="accountForm.invalid || isSaving"
        class="w-full h-11 bg-brand-purple hover:bg-[#4a1772] text-white font-bold font-mono rounded-xl shadow-md transition-all disabled:opacity-50 cursor-pointer outline-none mt-6"
      >
        {{ isSaving ? t('common.loading') : t('accounts.saveBtn') }}
      </button>
    </form>
  </app-modal>

</div>
