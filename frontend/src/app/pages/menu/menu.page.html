<div class="w-full space-y-6 pb-24">

  <!-- Page Header -->

      {{ t('nav.menu') || 'Meni' }}
    </h1>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
    <!-- Base Features -->
    <a routerLink="/dashboard" class="bg-white border border-slate-200/60 rounded-2xl p-4 flex items-center gap-4 hover:border-brand-purple/40 shadow-[0_4px_15px_rgba(15,23,42,0.01)] transition-all outline-none">
      <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500">

        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21 12a2.25 2.25 0 00-2.25-2.25H15a3 3 0 11-6 0H5.25A2.25 2.25 0 003 12m18 0v6a2.25 2.25 0 01-2.25 2.25H5.25A2.25 2.25 0 013 18v-6m18 0V9M3 12V9m18 0a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 9m18 0V6a2.25 2.25 0 00-2.25-2.25H5.25A2.25 2.25 0 003 6v3"/></svg>

      </div>
    </a>

    <a routerLink="/transactions" class="bg-white border border-slate-200/60 rounded-2xl p-4 flex items-center gap-4 hover:border-brand-purple/40 shadow-[0_4px_15px_rgba(15,23,42,0.01)] transition-all outline-none">
      <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M7.5 21L3 16.5m0 0L7.5 12M3 16.5h13.5m0-13.5L21 7.5m0 0L16.5 12M21 7.5H7.5"/></svg>
      </div>
      <div>
        <h3 class="font-bold text-slate-800 text-sm font-mono">{{ t('nav.transactions') }}</h3>
      </div>
    </a>

    <!-- Conditional Features -->
    <a *ngIf="hasFeature('categories')" routerLink="/categories" class="bg-white border border-slate-200/60 rounded-2xl p-4 flex items-center gap-4 hover:border-brand-purple/40 shadow-[0_4px_15px_rgba(15,23,42,0.01)] transition-all outline-none">
      <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.568 3H5.25A2.25 2.25 0 003 5.25v4.318c0 .597.237 1.17.659 1.591l9.581 9.581c.699.699 1.78.872 2.607.33a18.095 18.095 0 005.223-5.223c.542-.827.369-1.908-.33-2.607L11.16 3.66A2.25 2.25 0 009.568 3z"/><path stroke-linecap="round" stroke-linejoin="round" d="M6 6h.008v.008H6V6z"/></svg>

      <div>

      </div>
    </a>

    <a *ngIf="hasFeature('projects')" routerLink="/projects" class="bg-white border border-slate-200/60 rounded-2xl p-4 flex items-center gap-4 hover:border-brand-purple/40 shadow-[0_4px_15px_rgba(15,23,42,0.01)] transition-all outline-none">

        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M10.5 6h9.75M10.5 6a1.5 1.5 0 11-3 0m3 0a1.5 1.5 0 10-3 0M3.75 6H7.5m3 12h9.75m-9.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-3.75 0H7.5m9-6h3.75m-3.75 0a1.5 1.5 0 01-3 0m3 0a1.5 1.5 0 00-3 0m-9.75 0h9.75"/></svg>
      </div>
      <div>
        <h3 class="font-bold text-slate-800 text-sm font-mono">{{ t('nav.projects') || 'Projekti' }}</h3>
      </div>
    </a>

    <!-- Settings and Workspaces -->

      <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M3.75 6A2.25 2.25 0 016 3.75h2.25A2.25 2.25 0 0110.5 6v2.25a2.25 2.25 0 01-2.25 2.25H6a2.25 2.25 0 01-2.25-2.25V6zM3.75 15.75A2.25 2.25 0 016 13.5h2.25a2.25 2.25 0 012.25 2.25V18a2.25 2.25 0 01-2.25 2.25H6A2.25 2.25 0 013.75 18v-2.25zM13.5 6a2.25 2.25 0 012.25-2.25H18A2.25 2.25 0 0120.25 6v2.25A2.25 2.25 0 0118 10.5h-2.25a2.25 2.25 0 01-2.25-2.25V6zM13.5 15.75a2.25 2.25 0 012.25-2.25H18a2.25 2.25 0 0120.25 2.25V18A2.25 2.25 0 0118 20.25h-2.25A2.25 2.25 0 0113.5 18v-2.25z"/></svg>

      <div class="w-12 h-12 rounded-xl bg-slate-50 flex items-center justify-center text-slate-500">
        <svg class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9.594 3.94c.09-.542.56-.94 1.11-.94h2.593c.55 0 1.02.398 1.11.94l.213 1.281c.063.374.313.686.645.87.074.04.147.083.22.127.324.196.72.257 1.075.124l1.217-.456a1.125 1.125 0 011.37.49l1.296 2.247a1.125 1.125 0 01-.26 1.431l-1.003.827c-.293.24-.438.613-.431.992a6.759 6.759 0 010 .255c-.007.378.138.75.43.99l1.005.828c.424.35.534.954.26 1.43l-1.298 2.247a1.125 1.125 0 01-1.369.491l-1.217-.456c-.355-.133-.75-.072-1.076.124a6.57 6.57 0 01-.22.128c-.331.183-.581.495-.644.869l-.213 1.28c-.09.543-.56.941-1.11.941h-2.594c-.55 0-1.02-.398-1.11-.94l-.213-1.281c-.062-.374-.312-.686-.644-.87a6.52 6.52 0 01-.22-.127c-.325-.196-.72-.257-1.076-.124l-1.217.456a1.125 1.125 0 01-1.369-.49l-1.297-2.247a1.125 1.125 0 01.26-1.431l1.004-.827c.292-.24.437-.613.43-.992a6.932 6.932 0 010-.255c.007-.378-.138-.75-.43-.99l-1.004-.828a1.125 1.125 0 01-.26-1.43l1.297-2.247a1.125 1.125 0 011.37-.491l1.216.456c.356.133.751.072 1.076-.124.072-.044.146-.087.22-.128.332-.183.582-.495.644-.869l.214-1.281z"/><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
