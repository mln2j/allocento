<div class="w-full space-y-6 pb-24">

  <!-- Page Header -->
  <div class="mb-6 pb-4 border-b border-slate-100 flex items-center justify-between gap-3">
    <div class="flex items-center gap-3">
      <button
        *ngIf="!isMainNav"
        type="button"
        (click)="goBack()"
        class="flex items-center justify-center w-10 h-10 rounded-full bg-slate-100 hover:bg-slate-200 text-slate-600 transition-colors cursor-pointer outline-none border-none flex-shrink-0"
        [title]="t('common.back') || 'Back'"
      >
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
      </button>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-900 font-mono transition-all">
          {{ t('nav.categories') || 'Kategorije' }}
        </h1>
        <p class="text-slate-500 text-sm font-sans mt-1">
          {{ t('pageSubtitles.categories') || 'Upravljanje kategorijama troÅ¡kova' }}
        </p>
      </div>
    </div>
    <button
      (click)="openCreateModal()"
      class="bg-brand-purple hover:bg-[#4a1772] text-white px-4 py-2 rounded-xl text-sm font-bold font-mono shadow-sm transition-colors cursor-pointer border-none outline-none flex items-center gap-2"
    >
      <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/></svg>
      {{ t('common.add') || 'Dodaj' }}
    </button>
  </div>

  <ng-container *ngIf="!isLoading(); else loadingState">
    <div *ngIf="categories().length === 0" class="text-center py-12 bg-white rounded-2xl border border-slate-200/60 shadow-sm">
      <div class="w-16 h-16 mx-auto bg-slate-50 rounded-full flex items-center justify-center text-slate-400 mb-4">
        <svg class="w-8 h-8" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M12 6v12m-3-2.818l.879.659c1.171.879 3.07.879 4.242 0 1.172-.879 1.172-2.303 0-3.182C13.536 12.219 12.768 12 12 12c-.725 0-1.45-.22-2.003-.659-1.106-.879-1.106-2.303 0-3.182s2.9-.879 4.006 0l.415.33M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
      </div>
      <h3 class="text-sm font-bold text-slate-800 font-mono mb-1">{{ t('categories.emptyTitle') || 'Nema kategorija' }}</h3>
      <p class="text-xs text-slate-500 font-sans mb-6">{{ t('categories.emptyDesc') || 'Kreirajte prvu kategoriju' }}</p>
      <button (click)="openCreateModal()" class="text-brand-purple font-bold text-xs font-mono hover:underline outline-none">
        {{ t('categories.createFirst') || 'Kreiraj kategoriju' }}
      </button>
    </div>

    <div *ngIf="categories().length > 0" class="space-y-3">
      <div *ngFor="let c of categories()" class="bg-white rounded-2xl border border-slate-200/60 p-4 shadow-sm relative group transition-all hover:border-brand-purple/30 flex items-center justify-between">
        <div>
          <h3 class="font-bold text-slate-900 font-mono text-sm">{{ c.name }}</h3>
        </div>
        <div class="flex items-center gap-1 opacity-0 group-hover:opacity-100 transition-opacity">
          <button (click)="openEditModal(c)" class="p-2 text-slate-400 hover:text-brand-purple transition-colors outline-none cursor-pointer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M16.862 4.487l1.687-1.688a1.875 1.875 0 112.652 2.652L6.832 19.82a4.5 4.5 0 01-1.89 1.112l-2.83.942.942-2.83a4.5 4.5 0 011.112-1.89l12.696-12.696z"/></svg>
          </button>
          <button (click)="deleteCategory(c)" class="p-2 text-slate-400 hover:text-red-500 transition-colors outline-none cursor-pointer">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/></svg>
          </button>
        </div>
      </div>
    </div>
  </ng-container>

  <ng-template #loadingState>
    <div class="space-y-3">
      <div *ngFor="let i of [1,2,3]" class="bg-white rounded-2xl border border-slate-200 p-4 h-16 animate-pulse flex flex-col justify-center gap-2">
        <div class="h-4 bg-slate-100 rounded w-32"></div>
        <div class="h-3 bg-slate-100 rounded w-16"></div>
      </div>
    </div>
  </ng-template>
</div>

<!-- Modal for Create/Edit -->
<app-modal
  [isOpen]="isModalOpen"
  [title]="editingCategory ? (t('categories.editTitle') || 'Uredi kategoriju') : (t('categories.createTitle') || 'Nova kategorija')"
  (close)="closeModal()"
>
  <form [formGroup]="categoryForm" (ngSubmit)="saveCategory()" class="space-y-4">

    <div class="space-y-1.5">
      <label class="text-xs font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('common.name') || 'Naziv' }}</label>
      <input type="text" formControlName="name" class="w-full px-4 py-3 bg-slate-50 border border-slate-200 focus:border-brand-purple focus:ring-1 focus:ring-brand-purple rounded-xl outline-none font-mono text-sm transition-all text-slate-800 placeholder:text-slate-400">
    </div>

    <div class="pt-4 flex gap-3">
      <button type="button" (click)="closeModal()" class="flex-1 py-3 px-4 bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-bold font-mono text-sm rounded-xl transition-colors outline-none cursor-pointer">
        {{ t('common.cancel') || 'Odustani' }}
      </button>
      <button type="submit" [disabled]="categoryForm.invalid || isSaving" class="flex-1 py-3 px-4 bg-brand-purple hover:bg-[#4a1772] text-white font-bold font-mono text-sm rounded-xl transition-all shadow-sm outline-none disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isSaving ? (t('common.saving') || 'Spremanje...') : (t('common.save') || 'Spremi') }}
      </button>
    </div>
  </form>
</app-modal>
