<div class="fixed inset-0 flex flex-col items-center justify-center bg-brand-mint p-6">

  <div
    [class.opacity-100]="loaded"
    [class.translate-y-0]="loaded"
    class="w-full max-w-sm flex flex-col items-center opacity-0 translate-y-4 transition-all duration-700 ease-out"
  >

    <div class="text-center mb-10">
      <div class="w-30 h-30 mx-auto flex items-center justify-center">
        <img src="logo/white-logo.svg" alt="Allocento Logo" class="w-full h-full">
      </div>
      <h1 class="text-brand-purple text-4xl font-bold tracking-tighter" style="font-family: 'Space Mono', monospace;">
        Allocento
      </h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="w-full space-y-4">
      <div>
        <input
          formControlName="email"
          type="email"
          [placeholder]="t('auth.email_placeholder')"
          class="w-full p-4 rounded-xl border-2 border-white/50 bg-white placeholder:text-brand-purple/60 text-brand-purple focus:border-brand-purple outline-none transition-all"
          style="font-family: 'Space Mono', monospace;"
        />
      </div>

      <div>
        <input
          formControlName="password"
          type="password"
          [placeholder]="t('auth.password_placeholder')"
          class="w-full p-4 rounded-xl border-2 border-white/50 bg-white placeholder:text-brand-purple/60 text-brand-purple focus:border-brand-purple outline-none transition-all"
          style="font-family: 'Space Mono', monospace;"
        />
      </div>

      <div *ngIf="errorMessage" class="text-red-600 text-sm font-bold text-center">
        {{ errorMessage }}
      </div>

      <button
        [disabled]="form.invalid || loading"
        class="w-full py-4 bg-brand-purple hover:bg-[#4a1772] text-white rounded-xl font-bold text-lg shadow-xl shadow-brand-purple/20 transition-all duration-200 disabled:opacity-50"
        style="font-family: 'Space Mono', monospace;">
        {{ loading ? t('auth.signing_in') : t('auth.sign_in') }}
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-brand-purple/80 text-sm mb-1" style="font-family: 'Space Mono', monospace;">
        {{ t('auth.dont_have_account') }}
      </p>
      <a routerLink="/auth/register" class="text-brand-purple font-bold hover:underline" style="font-family: 'Space Mono', monospace;">
        {{ t('auth.register') }}
      </a>
    </div>

  </div>
</div>
