<div class="fixed inset-0 flex flex-col items-center justify-center bg-brand-mint p-6 overflow-y-auto">

  <div
    [class.opacity-100]="loaded"
    [class.translate-y-0]="loaded"
    class="w-full max-w-sm flex flex-col items-center opacity-0 translate-y-4 transition-all duration-700 ease-out my-auto"
  >

    <div class="text-center mb-8">
      <div class="w-20 h-20 mx-auto flex items-center justify-center">
        <img src="logo/white-logo.svg" alt="Allocento Logo" class="w-full h-full">
      </div>
      <h1 class="text-brand-purple text-3xl font-bold tracking-tighter mt-2" style="font-family: 'Space Mono', monospace;">
        {{ t('auth.create_account') }}
      </h1>
    </div>

    <form [formGroup]="form" (ngSubmit)="submit()" class="w-full space-y-4">
      <input formControlName="name" type="text" [placeholder]="t('auth.name_placeholder')"
             class="w-full p-4 rounded-xl border-2 border-white/50 bg-white text-brand-purple/60 focus:border-brand-purple outline-none transition-all" style="font-family: 'Space Mono', monospace;" />

      <input formControlName="email" type="email" [placeholder]="t('auth.email_placeholder')"
             class="w-full p-4 rounded-xl border-2 border-white/50 bg-white text-brand-purple/60 focus:border-brand-purple outline-none transition-all" style="font-family: 'Space Mono', monospace;" />

      <input formControlName="password" type="password" [placeholder]="t('auth.password_placeholder')"
             class="w-full p-4 rounded-xl border-2 border-white/50 bg-white text-brand-purple/60 focus:border-brand-purple outline-none transition-all" style="font-family: 'Space Mono', monospace;" />

      <input formControlName="passwordConfirm" type="password" [placeholder]="t('auth.confirm_password_placeholder')"
             class="w-full p-4 rounded-xl border-2 border-white/50 bg-white text-brand-purple/60 focus:border-brand-purple outline-none transition-all" style="font-family: 'Space Mono', monospace;" />

      <div *ngIf="errorMessage || form.hasError('passwordsMismatch')" class="text-red-600 text-sm font-bold text-center">
        {{ errorMessage || t('auth.passwords_mismatch') }}
      </div>

      <button [disabled]="form.invalid || loading"
              class="w-full py-4 bg-brand-purple hover:bg-[#4a1772] text-white rounded-xl font-bold text-lg shadow-xl shadow-brand-purple/20 transition-all duration-200 disabled:opacity-50"
              style="font-family: 'Space Mono', monospace;">
        {{ loading ? t('auth.creating_account') : t('auth.register') }}
      </button>
    </form>

    <div class="mt-8 text-center">
      <p class="text-brand-purple/80 text-sm mb-1" style="font-family: 'Space Mono', monospace;">
        {{ t('auth.already_have_account') }}
      </p>
      <a routerLink="/auth/login" class="text-brand-purple font-bold hover:underline" style="font-family: 'Space Mono', monospace;">
        {{ t('auth.sign_in') }}
      </a>
    </div>

  </div>
</div>
