<app-container>
  <header header class="form-header">
    <button mat-icon-button class="btn-ghost" (click)="cancel()"><mat-icon>arrow_back</mat-icon></button>
    <h1>Edit Profile</h1>
  </header>

  <mat-card class="form-card">
    <form [formGroup]="profileForm" (ngSubmit)="onSubmit()">
      
      <div class="photo-edit-section">
        <div class="avatar-preview">
          <img [src]="previewUrl" alt="Preview">
        </div>
        <div class="photo-actions">
          <app-button variant="ghost" (click)="fileInput.click()" type="button"><mat-icon>photo_camera</mat-icon> Change Photo</app-button>
          <p class="hint">Recommended: Square JPG or PNG, max 1MB.</p>
        </div>
        <input #fileInput type="file" hidden accept="image/*" (change)="onFileSelected($event)">
      </div>

      <div class="form-section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Full Name</mat-label>
          <mat-icon matPrefix>person_outline</mat-icon>
          <input matInput formControlName="name">
        </mat-form-field>
      </div>

      <div class="form-section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Email Address</mat-label>
          <mat-icon matPrefix>mail_outline</mat-icon>
          <input matInput formControlName="email" type="email">
        </mat-form-field>
      </div>

      <div class="form-actions">
        <app-button variant="ghost" (click)="cancel()" type="button">Cancel</app-button>
        <app-button variant="primary" type="submit" [disabled]="profileForm.invalid || isSaving">{{ isSaving ? 'Saving...' : 'Save Changes' }}</app-button>
      </div>
    </form>
  </mat-card>
</app-container>
