<div class="max-w-xl mx-auto" *ngIf="user">

  <div class="mb-6 space-y-1">
    <h1 class="text-2xl font-bold tracking-tight text-slate-900 font-mono">
      {{ t('nav.profile') }}
    </h1>
    <p class="text-sm text-slate-500 font-sans">
      {{ t('profile.subtitle') }}
    </p>
  </div>

  <div class="glass-card relative transition-all duration-300">

    <div *ngIf="!isEditMode" class="flex flex-col items-center text-center pt-4 space-y-4">

      <div class="w-24 h-24 bg-brand-purple/10 text-brand-purple rounded-full flex items-center justify-center border border-brand-purple/20 shadow-sm overflow-hidden">
        <img *ngIf="user.profile_photo_url" [src]="user.profile_photo_url" alt="Profile" class="w-full h-full object-cover">
        <span *ngIf="!user.profile_photo_url" class="text-3xl font-bold font-mono">
          {{ user.name[0]?.toUpperCase() }}
        </span>
      </div>

      <div class="space-y-1">
        <h2 class="text-xl font-bold text-slate-900 tracking-tight">{{ user.name }}</h2>
        <p class="text-sm text-slate-500 font-mono">{{ user.email }}</p>
      </div>

      <div class="w-full py-2 flex justify-center relative font-mono text-xs">
        <button type="button" (click)="toggleLangDropdown(); $event.stopPropagation()"
                class="flex items-center gap-2 px-4 py-2 bg-slate-50 border border-slate-200 hover:border-brand-purple/40 rounded-full font-bold text-slate-700 transition-all cursor-pointer outline-none select-none shadow-xs">
          <svg class="w-4 h-4 text-slate-400" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 21a9.004 9.004 0 008.716-6.747M12 21a9.004 9.004 0 01-8.716-6.747M12 21c2.485 0 4.5-4.03 4.5-9S14.485 3 12 3m0 18c-2.485 0-4.5-4.03-4.5-9s2.015-9 4.5-9m0 0a9.003 9.003 0 018.716 5.253M12 3a9.003 9.003 0 00-8.716 5.253M12 12h.008v.008H12V12zm0-4.5h.008v.008H12V7.5zm0 9h.008v.008H12v-.008zM12 12h3.75M12 12H8.25m3.75 0V8.25m0 3.75v3.75" />
          </svg>
          <span>{{ currentLang === 'hr' ? 'Hrvatski' : 'English' }}</span>
          <svg class="w-3 h-3 text-slate-400 transition-transform duration-200" [class.rotate-180]="isLangDropdownOpen" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19 9l-7 7-7-7"/>
          </svg>
        </button>

        <div *ngIf="isLangDropdownOpen"
             class="absolute top-full mt-1 w-36 bg-white border border-slate-100 rounded-xl shadow-xl py-1 z-30 animate-in fade-in slide-in-from-top-1 duration-150">
          <button type="button" (click)="setLang('hr')"
                  class="w-full text-left px-4 py-2 hover:bg-slate-50 transition-colors font-bold text-slate-700 cursor-pointer outline-none"
                  [class.text-brand-purple]="currentLang === 'hr'">
            Hrvatski
          </button>
          <button type="button" (click)="setLang('en')"
                  class="w-full text-left px-4 py-2 hover:bg-slate-50 transition-colors font-bold text-slate-700 cursor-pointer outline-none"
                  [class.text-brand-purple]="currentLang === 'en'">
            English
          </button>
        </div>
      </div>

      <div class="w-full pt-4 border-t border-slate-100 flex flex-col gap-2">
        <button type="button" (click)="enableEditMode()"
                class="w-full py-3 px-4 bg-brand-purple hover:bg-brand-purple/90 text-white font-bold rounded-xl shadow-sm transition-all text-sm font-mono cursor-pointer outline-none">
          {{ t('profile.editBtn') }}
        </button>

        <button type="button" (click)="logout()"
                class="w-full py-3 px-4 bg-slate-50 hover:bg-slate-100 border border-slate-200 text-slate-700 font-bold rounded-xl transition-all text-sm font-mono cursor-pointer outline-none">
          {{ t('profile.logout') }}
        </button>
      </div>
    </div>

    <form *ngIf="isEditMode" [formGroup]="profileForm" (ngSubmit)="saveProfile()" class="space-y-5 pt-4" (click)="closeLangDropdown()">

      <div class="text-center font-mono text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">
        {{ t('profile.editTitle') }}
      </div>

      <div class="flex flex-col items-center space-y-2">
        <div class="w-20 h-20 bg-slate-50 border border-slate-200 rounded-full flex items-center justify-center overflow-hidden relative group">
          <img *ngIf="photoPreview || user.profile_photo_url" [src]="photoPreview || user.profile_photo_url" class="w-full h-full object-cover">
          <span *ngIf="!photoPreview && !user.profile_photo_url" class="text-2xl font-bold text-slate-400 font-mono">
            {{ user.name[0]?.toUpperCase() }}
          </span>
        </div>

        <label class="text-xs font-bold text-brand-purple cursor-pointer hover:underline font-mono select-none">
          {{ t('profile.changePhoto') }}
          <input type="file" (change)="onFileSelected($event)" accept="image/*" class="hidden">
        </label>
      </div>

      <div class="space-y-1.5">
        <label class="text-xs font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('profile.nameLabel') }}</label>
        <input type="text" formControlName="name" class="input-field font-mono text-sm">
      </div>

      <div class="space-y-1.5 opacity-60">
        <label class="text-xs font-bold text-slate-500 font-mono uppercase tracking-wider">{{ t('profile.emailLabel') }}</label>
        <input type="email" [value]="user.email" readonly class="input-field bg-slate-100 font-mono text-sm cursor-not-allowed">
      </div>

      <div class="border border-slate-100 rounded-xl overflow-hidden bg-slate-50/50">
        <button type="button" (click)="isPasswordCollapsed = !isPasswordCollapsed"
                class="w-full px-4 py-3 flex items-center justify-between text-xs font-bold font-mono text-slate-600 bg-slate-50 hover:bg-slate-100/80 transition-all outline-none cursor-pointer select-none">
          <span>{{ t('security.changePasswordToggle') }}</span>
          <span>{{ isPasswordCollapsed ? '▲' : '▼' }}</span>
        </button>

        <div [class.hidden]="isPasswordCollapsed" class="p-4 space-y-4 border-t border-slate-100 bg-white">
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 font-mono">{{ t('security.currentPassword') }}</label>
            <input type="password" formControlName="current_password" class="input-field font-mono text-sm">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 font-mono">{{ t('security.newPassword') }}</label>
            <input type="password" formControlName="password" class="input-field font-mono text-sm">
          </div>
          <div class="space-y-1.5">
            <label class="text-xs font-bold text-slate-500 font-mono">{{ t('security.confirmPassword') }}</label>
            <input type="password" formControlName="password_confirmation" class="input-field font-mono text-sm">
            <div *ngIf="profileForm.hasError('notMatching') && profileForm.get('password_confirmation')?.touched" class="text-xs font-bold text-brand-error font-mono mt-1">
              {{ t('security.passwordMismatch') }}
            </div>
          </div>
        </div>
      </div>

      <div class="pt-2 grid grid-cols-2 gap-3 font-mono text-sm">
        <button type="button" (click)="cancelEdit()"
                class="w-full py-3 px-4 bg-white hover:bg-slate-50 border border-slate-200 text-slate-600 font-bold rounded-xl transition-all cursor-pointer outline-none">
          {{ t('profile.cancel') }}
        </button>
        <button type="submit" [disabled]="profileForm.invalid || isSaving"
                class="w-full py-3 px-4 bg-brand-purple hover:bg-brand-purple/90 text-white font-bold rounded-xl shadow-sm transition-all disabled:opacity-50 cursor-pointer outline-none">
          {{ isSaving ? t('profile.saving') : t('profile.save') }}
        </button>
      </div>

      <div class="pt-4 border-t border-slate-100 flex justify-center">
        <button type="button" (click)="deleteAccount()" class="text-xs font-bold font-mono text-red-400 hover:text-brand-error transition-colors cursor-pointer outline-none">
          ❌ {{ t('profile.deleteAccount') }}
        </button>
      </div>

    </form>

  </div>
</div>
