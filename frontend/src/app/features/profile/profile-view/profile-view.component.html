<div class="max-w-2xl mx-auto p-6 space-y-8">

  <div class="flex items-center gap-4">
    <img [src]="user?.profile_photo_url" class="w-16 h-16 rounded-full bg-slate-100 object-cover border border-slate-200">
    <div class="flex-grow">
      <h1 class="text-xl font-bold text-slate-900">{{ user?.name }}</h1>
      <p class="text-slate-500 text-sm">{{ user?.email }}</p>
    </div>
    <button routerLink="/profile/edit" class="text-sm font-medium text-brand-purple hover:underline">Edit</button>
  </div>

  <div class="grid gap-3">
    <h2 class="text-xs font-bold text-slate-400 uppercase tracking-widest px-1">Memberships</h2>

    <a [routerLink]="user?.household_id ? '/household' : null" class="flex items-center p-4 bg-white border border-slate-200 rounded-xl hover:border-brand-purple transition-colors">
      <span class="mr-4">🏠</span>
      <div class="flex-grow">
        <p class="font-bold text-sm">Household</p>
        <p class="text-xs text-slate-500">{{ householdName || 'Not joined' }}</p>
      </div>
    </a>

    <a [routerLink]="user?.organization_id ? '/organization' : null" class="flex items-center p-4 bg-white border border-slate-200 rounded-xl hover:border-brand-purple transition-colors">
      <span class="mr-4">🏢</span>
      <div class="flex-grow">
        <p class="font-bold text-sm">Organization</p>
        <p class="text-xs text-slate-500">{{ organizationName || 'Not joined' }}</p>
      </div>
    </a>
  </div>

  <div class="border-t border-slate-100 pt-6 space-y-2">
    <button (click)="deleteAccount()" class="w-full text-left px-4 py-2 text-sm text-red-600 hover:bg-red-50 rounded-lg">Delete Account</button>
    <button (click)="logout()" class="w-full text-left px-4 py-2 text-sm text-slate-600 hover:bg-slate-100 rounded-lg">Logout</button>
  </div>
</div>
