<div class="page-container">
  <mat-card class="form-card">
    <mat-card-header>
      <button mat-icon-button routerLink="/accounts" class="back-btn">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <mat-card-title>Create Account</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (currentUser) {
        <form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="modern-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Account Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. Daily Expenses">
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Type</mat-label>
              <mat-select formControlName="type">
                <mat-option value="personal">Personal</mat-option>
                <mat-option value="household" *ngIf="currentUser.household_id">Household</mat-option>
                <mat-option value="organization" *ngIf="currentUser.organization_id">Organization</mat-option>
              </mat-select>
              <mat-hint *ngIf="!currentUser.household_id && !currentUser.organization_id">
                Join a group to create shared accounts.
              </mat-hint>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Currency</mat-label>
              <mat-select formControlName="currency">
                <mat-option value="EUR">EUR (€)</mat-option>
                <mat-option value="USD">USD ($)</mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Initial Balance</mat-label>
            <input matInput type="number" formControlName="balance">
          </mat-form-field>

          <div class="form-actions">
            <button mat-button type="button" routerLink="/accounts">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="accountForm.invalid">Create Account</button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</div>
