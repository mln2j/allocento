<div class="form-page">
  <div class="form-container">
    <header class="form-header">
      <button mat-icon-button (click)="onCancel()"><mat-icon>arrow_back</mat-icon></button>
      <h1>Edit Account</h1>
    </header>

    @if (isLoading) {
      <div class="form-loader"><mat-spinner diameter="32"></mat-spinner></div>
    } @else {
      <mat-card class="form-card">
        <form [formGroup]="form" (ngSubmit)="onSubmit()">
          
          <div class="form-section">
            <mat-form-field appearance="outline" class="full-width">
              <mat-label>Account Name</mat-label>
              <input matInput formControlName="name" placeholder="e.g. Daily Spending">
              <mat-error *ngIf="form.get('name')?.invalid">Name is required (min 2 chars)</mat-error>
            </mat-form-field>
          </div>

          <div class="form-section">
            <label class="section-label">Account Type</label>
            <div class="type-selector">
              <button type="button" class="type-btn" [class.active]="form.get('type')?.value === 'personal'" (click)="form.get('type')?.setValue('personal')">
                <mat-icon>person</mat-icon><span>Personal</span>
              </button>
              <button type="button" class="type-btn" [class.active]="form.get('type')?.value === 'household'" 
                      [disabled]="!householdAvailable" (click)="householdAvailable && form.get('type')?.setValue('household')">
                <mat-icon>home</mat-icon><span>Household</span>
              </button>
              <button type="button" class="type-btn" [class.active]="form.get('type')?.value === 'organization'" 
                      [disabled]="!organizationAvailable" (click)="organizationAvailable && form.get('type')?.setValue('organization')">
                <mat-icon>business</mat-icon><span>Org</span>
              </button>
            </div>
          </div>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Currency</mat-label>
              <select matNativeControl formControlName="currency">
                <option value="EUR">EUR (€)</option>
                <option value="USD">USD ($)</option>
                <option value="HRK">HRK (kn)</option>
              </select>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Current Balance</mat-label>
              <input matInput type="number" formControlName="balance">
            </mat-form-field>
          </div>

          <div class="form-actions">
            <button mat-button type="button" (click)="onCancel()">Cancel</button>
            <button mat-flat-button color="primary" type="submit" [disabled]="form.invalid || isSubmitting">
              {{ isSubmitting ? 'Saving...' : 'Save Changes' }}
            </button>
          </div>
        </form>
      </mat-card>
    }
  </div>
</div>
