<app-container>
  <mat-card class="form-card">
    <mat-card-header header>
      <button mat-icon-button routerLink="/accounts" class="back-btn">
        <mat-icon>arrow_back</mat-icon>
      </button>
      <mat-card-title>Edit Account</mat-card-title>
    </mat-card-header>

    <mat-card-content>
      @if (account) {
        <form [formGroup]="accountForm" (ngSubmit)="onSubmit()" class="modern-form">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Account Name</mat-label>
            <input matInput formControlName="name" placeholder="e.g. My Savings">
          </mat-form-field>

          <div class="form-row">
            <mat-form-field appearance="outline">
              <mat-label>Type</mat-label>
              <mat-select formControlName="type">
                <mat-option value="personal">Personal</mat-option>
                <mat-option value="household">Household</mat-option>
                <mat-option value="organization">Organization</mat-option>
              </mat-select>
            </mat-form-field>

            <mat-form-field appearance="outline">
              <mat-label>Currency</mat-label>
              <mat-select formControlName="currency">
                <mat-option value="EUR">EUR (€)</mat-option>
                <mat-option value="USD">USD ($)</mat-option>
                <mat-option value="GBP">GBP (£)</mat-option>
              </mat-select>
            </mat-form-field>
          </div>

          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Initial Balance</mat-label>
            <input matInput type="number" formControlName="balance">
            <span matPrefix>{{ accountForm.get('currency')?.value === 'EUR' ? '€' : '$' }}&nbsp;</span>
          </mat-form-field>

          <div class="form-actions">
            <app-button variant="ghost" (click)="router.navigate(['/accounts', accountId])" type="button">Cancel</app-button>
            <app-button variant="primary" [block]="true" type="submit" [disabled]="accountForm.invalid">Save Changes</app-button>
          </div>
        </form>
      }
    </mat-card-content>
  </mat-card>
</app-container>
