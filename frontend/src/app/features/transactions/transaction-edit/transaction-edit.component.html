<app-container>
  <!-- Header section -->
  <header class="flex items-center justify-between pb-6 border-b border-slate-100 mb-8 font-sans">
    <div class="flex items-center gap-4">
      <button (click)="cancel()" type="button"
              class="p-2 text-slate-450 hover:text-brand-purple hover:bg-slate-50 border border-slate-200/50 rounded-xl transition-colors focus:outline-none cursor-pointer"
              aria-label="Back">
        <!-- Back Arrow Icon SVG -->
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M10.5 19.5L3 12m0 0l7.5-7.5M3 12h18"/>
        </svg>
      </button>
      <div>
        <h1 class="text-2xl font-bold tracking-tight text-slate-800 font-mono">
          {{ t('transactions.edit_title') || 'Edit Transaction' }}
        </h1>
        <p class="text-xs text-slate-400 font-mono mt-1">
          {{ t('transactions.edit_subtitle') || 'Modify details or delete this entry' }}
        </p>
      </div>
    </div>

    <!-- Danger Zone: Delete Button in Header -->
    <button (click)="deleteTransaction()" type="button"
            class="p-2 text-rose-500 hover:text-rose-700 hover:bg-rose-50 border border-rose-100 rounded-xl transition-colors focus:outline-none cursor-pointer"
            aria-label="Delete">
      <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M14.74 9l-.346 9m-4.788 0L9.26 9m9.968-3.21c.342.052.682.107 1.022.166m-1.022-.165L18.16 19.673a2.25 2.25 0 01-2.244 2.077H8.084a2.25 2.25 0 01-2.244-2.077L4.772 5.79m14.456 0a48.108 48.108 0 00-3.478-.397m-12 .562c.34-.059.68-.114 1.022-.165m0 0a48.11 48.11 0 013.478-.397m7.5 0v-.916c0-1.18-.91-2.164-2.09-2.201a51.964 51.964 0 00-3.32 0c-1.18.037-2.09 1.022-2.09 2.201v.916m7.5 0a48.667 48.667 0 00-7.5 0"/>
      </svg>
    </button>
  </header>

  <!-- Form container card -->
  <div class="glass-card max-w-xl mx-auto" *ngIf="form">
    <form [formGroup]="form" (ngSubmit)="submit()" class="space-y-6 font-sans">
      
      <!-- Transaction Type Selector -->
      <div class="space-y-2">
        <label class="text-xs font-mono font-bold text-slate-400 uppercase tracking-wider block">
          {{ t('transactions.type') || 'Transaction Type' }}
        </label>
        <div class="grid grid-cols-2 gap-3">
          <!-- Expense Button -->
          <button type="button" (click)="form.get('type')?.setValue('expense')"
                  class="flex items-center justify-center gap-2 p-3.5 border-2 rounded-xl font-mono text-sm font-bold uppercase tracking-wider transition-all focus:outline-none cursor-pointer"
                  [ngClass]="form.get('type')?.value === 'expense' 
                    ? 'bg-rose-50 border-rose-500 text-rose-600 shadow-sm shadow-rose-100' 
                    : 'bg-white border-slate-200 text-slate-450 hover:bg-slate-50'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 12h-15"/>
            </svg>
            {{ t('transactions.type_expense') || 'Expense' }}
          </button>

          <!-- Income Button -->
          <button type="button" (click)="form.get('type')?.setValue('income')"
                  class="flex items-center justify-center gap-2 p-3.5 border-2 rounded-xl font-mono text-sm font-bold uppercase tracking-wider transition-all focus:outline-none cursor-pointer"
                  [ngClass]="form.get('type')?.value === 'income' 
                    ? 'bg-emerald-50 border-emerald-500 text-emerald-600 shadow-sm shadow-emerald-100' 
                    : 'bg-white border-slate-200 text-slate-450 hover:bg-slate-50'">
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" d="M12 4.5v15m7.5-7.5h-15"/>
            </svg>
            {{ t('transactions.type_income') || 'Income' }}
          </button>
        </div>
      </div>

      <!-- Amount Input -->
      <div class="space-y-1.5">
        <label class="text-xs font-mono font-bold text-slate-400 uppercase tracking-wider block">
          {{ t('transactions.amount') || 'Amount' }}
        </label>
        <div class="relative flex items-center">
          <span class="absolute left-4 font-mono font-bold text-slate-400 select-none text-base">€</span>
          <input formControlName="amount" type="number" step="0.01" min="0.01" placeholder="0.00"
                 class="input-field pl-9 text-base font-mono font-bold text-slate-850" />
        </div>
      </div>

      <!-- Account Selector -->
      <div class="space-y-1.5">
        <label class="text-xs font-mono font-bold text-slate-400 uppercase tracking-wider block">
          {{ t('transactions.account') || 'Account' }}
        </label>
        <select formControlName="accountId" class="input-field font-sans font-medium text-slate-750 appearance-none bg-[url('data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns%3D%22http%3A%2F%2Fwww.w3.org%2F2000%2Fsvg%22%20viewBox%3D%220%200%2020%2020%2522%20fill%3D%22none%22%3E%3Cpath%20d%3D%22M7%209l3%203%203-3%22%20stroke%3D%22%2364748b%22%20stroke-width%3D%221.5%22%20stroke-linecap%3D%22round%22%20stroke-linejoin%3D%22round%22%2F%3E%3C%2Fsvg%3E')] bg-[size:1.25rem_1.25rem] bg-[position:right_1rem_center] bg-no-repeat pr-10">
          @for (acc of accounts; track acc.id) {
            <option [value]="acc.id">
              {{ acc.name }} ({{ acc.balance | number:'1.2-2' }} {{ acc.currency }})
            </option>
          }
        </select>
      </div>

      <!-- Date & Time Input -->
      <div class="space-y-1.5">
        <label class="text-xs font-mono font-bold text-slate-400 uppercase tracking-wider block">
          {{ t('transactions.date') || 'Date & Time' }}
        </label>
        <input formControlName="datetime" type="datetime-local" class="input-field font-mono text-sm text-slate-750" />
      </div>

      <!-- Description Input -->
      <div class="space-y-1.5">
        <label class="text-xs font-mono font-bold text-slate-400 uppercase tracking-wider block">
          {{ t('transactions.description') || 'Description' }}
        </label>
        <textarea formControlName="description" rows="3" [placeholder]="t('transactions.desc_placeholder') || 'What was this for?'"
                  class="input-field text-sm font-sans leading-relaxed"></textarea>
      </div>

      <!-- Error message display -->
      <div *ngIf="errorMessage" class="text-red-500 text-xs font-mono font-bold text-center bg-red-50 p-3 rounded-xl border border-red-100 animate-pulse">
        {{ errorMessage }}
      </div>

      <!-- Form Actions -->
      <div class="flex items-center gap-3 pt-4 border-t border-slate-100">
        <button (click)="cancel()" type="button"
                class="flex-1 py-3 px-4 bg-slate-50 border border-slate-200 text-slate-600 rounded-xl font-mono text-sm font-bold uppercase tracking-wider hover:bg-slate-100 transition-colors cursor-pointer focus:outline-none">
          {{ t('common.cancel') || 'Cancel' }}
        </button>
        <button [disabled]="form.invalid || submitting" type="submit"
                class="flex-1 btn-primary py-3 px-4 font-mono text-sm font-bold uppercase tracking-wider flex items-center justify-center gap-2 cursor-pointer focus:outline-none disabled:opacity-50">
          <svg *ngIf="submitting" class="animate-spin -ml-1 mr-2 h-4 w-4 text-white" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"/>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"/>
          </svg>
          {{ submitting ? (t('transactions.updating') || 'Updating...') : (t('transactions.update') || 'Update Transaction') }}
        </button>
      </div>

    </form>
  </div>
</app-container>
