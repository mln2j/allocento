<app-container>
  <header header class="form-header">
    <button mat-icon-button (click)="cancel()"><mat-icon>arrow_back</mat-icon></button>
    <h1>Edit Transaction</h1>
  </header>

  <mat-card class="form-card">
    <form [formGroup]="form" (ngSubmit)="submit()">
      
      <div class="form-section">
        <label class="section-label">Transaction Type</label>
        <div class="type-selector binary">
          <button type="button" class="type-btn expense" [class.active]="form.get('type')?.value === 'expense'" (click)="form.get('type')?.setValue('expense')">
            <mat-icon>remove_circle_outline</mat-icon><span>Expense</span>
          </button>
          <button type="button" class="type-btn income" [class.active]="form.get('type')?.value === 'income'" (click)="form.get('type')?.setValue('income')">
            <mat-icon>add_circle_outline</mat-icon><span>Income</span>
          </button>
        </div>
      </div>

      <div class="form-section">
        <mat-form-field appearance="outline" class="full-width amount-field">
          <mat-label>Amount</mat-label>
          <input matInput type="number" formControlName="amount" placeholder="0.00">
          <span matPrefix class="currency-prefix">€&nbsp;</span>
        </mat-form-field>
      </div>

      <div class="form-section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Account</mat-label>
          <mat-select formControlName="accountId">
            @for (acc of accounts; track acc.id) {
              <mat-option [value]="acc.id">{{ acc.name }} ({{ acc.balance | number:'1.2-2' }} {{ acc.currency }})</mat-option>
            }
          </mat-select>
        </mat-form-field>
      </div>

      <div class="form-row">
        <mat-form-field appearance="outline">
          <mat-label>Date & Time</mat-label>
          <input matInput type="datetime-local" formControlName="datetime">
        </mat-form-field>
      </div>

      <div class="form-section">
        <mat-form-field appearance="outline" class="full-width">
          <mat-label>Description</mat-label>
          <textarea matInput formControlName="description" rows="3" placeholder="What was this for?"></textarea>
        </mat-form-field>
      </div>

      <div class="form-actions">
        <app-button variant="ghost" (click)="cancel()" type="button">Cancel</app-button>
        <app-button variant="primary" [block]="true" type="submit" [disabled]="form.invalid || submitting">
          {{ submitting ? 'Updating...' : 'Update Transaction' }}
        </app-button>
      </div>
    </form>
  </mat-card>
</app-container>
