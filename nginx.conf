server {
    server_name allocento.komsiluk.org;

    # FRONTEND
    location / {
        root /home/allocento/app/frontend/dist/allocento/browser/;
        index index.html;

        # Standardni Angular fallback za SPA rute
        try_files $uri $uri/ /index.html;
    }

    # STORAGE (Photos and files)
    location /storage/ {
        alias /home/allocento/app/backend/storage/app/public/;
        access_log off;
        expires max;
    }

    # BACKEND
    location /api/ {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # SSL
    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/allocento.komsiluk.org/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/allocento.komsiluk.org/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# Automatsko preusmjeravanje s http (80) na https (443)
server {
    if ($host = allocento.komsiluk.org) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    listen 80;
    server_name allocento.komsiluk.org;
    return 404; # managed by Certbot
}
