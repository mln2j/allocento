name: Deploy to home server

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '26'

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or pull repository on server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << EOF
          set -e
          if [ ! -d /home/allocento/app/.git ]; then
            mkdir -p /home/allocento/app
            cd /home/allocento/app
            git init
            git remote add origin https://github.com/${GITHUB_REPOSITORY}.git || git remote set-url origin https://github.com/${GITHUB_REPOSITORY}.git
            git fetch origin
            git checkout -f -B main origin/main
          else
            cd /home/allocento/app
            git fetch origin
            git reset --hard origin/main
            git clean -fd
          fi
          EOF

      - name: Create backend .env
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
          VAPID_PUBLIC_KEY: ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          
          # Overwrite or create .env from .env.example
          cp -f .env.example .env
          
          # Replace DB connection details
          sed -i 's/^DB_CONNECTION=.*/DB_CONNECTION=pgsql/' .env
          sed -i 's/^# DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^# DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^DB_PORT=.*/DB_PORT=5432/' .env
          sed -i 's/^# DB_DATABASE=.*/DB_DATABASE=allocento/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=allocento/' .env
          sed -i 's/^# DB_USERNAME=.*/DB_USERNAME=allocento/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=allocento/' .env
          
          # Inject the password securely
          sed -i 's/^# DB_PASSWORD=.*/DB_PASSWORD='"$DB_PASSWORD"'/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD='"$DB_PASSWORD"'/' .env
          
          # Replace other environment variables to match production configuration
          sed -i 's/^APP_ENV=.*/APP_ENV=production/' .env
          sed -i 's/^APP_DEBUG=.*/APP_DEBUG=false/' .env
          sed -i 's|^APP_URL=.*|APP_URL=https://allocento.komsiluk.org|' .env
          
          # Inject SMTP values
          sed -i 's/^MAIL_MAILER=.*/MAIL_MAILER=smtp/' .env
          sed -i 's/^MAIL_HOST=.*/MAIL_HOST=smtp.resend.com/' .env
          sed -i 's/^MAIL_PORT=.*/MAIL_PORT=465/' .env
          sed -i 's/^MAIL_ENCRYPTION=.*/MAIL_ENCRYPTION=tls/' .env
          sed -i 's/^MAIL_USERNAME=.*/MAIL_USERNAME=resend/' .env
          sed -i 's/^MAIL_PASSWORD=.*/MAIL_PASSWORD='"$MAIL_PASSWORD"'/' .env
          sed -i 's/^MAIL_FROM_ADDRESS=.*/MAIL_FROM_ADDRESS="no-reply@allocento.komsiluk.org"/' .env
          
          # Inject VAPID keys
          if ! grep -q "VAPID_PUBLIC_KEY" .env; then
            echo "" >> .env
            echo "VAPID_PUBLIC_KEY=$VAPID_PUBLIC_KEY" >> .env
            echo "VAPID_PRIVATE_KEY=$VAPID_PRIVATE_KEY" >> .env
          else
            sed -i 's/^VAPID_PUBLIC_KEY=.*/VAPID_PUBLIC_KEY='"$VAPID_PUBLIC_KEY"'/' .env
            sed -i 's/^VAPID_PRIVATE_KEY=.*/VAPID_PRIVATE_KEY='"$VAPID_PRIVATE_KEY"'/' .env
          fi

          # Generate APP_KEY if not set
          if ! grep -q "^APP_KEY=base64:" .env; then
            php artisan key:generate --no-interaction
          fi
          EOF

      - name: Install backend dependencies
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          composer install --no-dev --optimize-autoloader --no-interaction
          EOF

      - name: Run backend migrations
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          php artisan migrate --force
          EOF

      - name: Cache backend config and routes
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          php artisan config:cache
          php artisan route:cache
          EOF

      - name: Restart backend service
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          sudo systemctl restart allocento-backend
          EOF

      - name: Create frontend environment files
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          mkdir -p /home/allocento/app/frontend/src/environments
          cat <<EOT > /home/allocento/app/frontend/src/environments/environment.prod.ts
export const environment = {
  production: true,
  apiBaseUrl: 'https://allocento.komsiluk.org/api'
};
EOT
          cat <<EOT > /home/allocento/app/frontend/src/environments/environment.ts
export const environment = {
  production: false,
  apiBaseUrl: 'http://localhost:8000/api'
};
EOT
          EOF

      - name: Install frontend dependencies
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/frontend
          npm ci
          EOF

      - name: Build frontend
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/frontend
          npm run build:prod
          EOF

      - name: Reload Nginx
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          sudo systemctl reload nginx
          EOF
