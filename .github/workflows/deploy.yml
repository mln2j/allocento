name: Deploy to home server

on:
  push:
    branches: [ main ]

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Clone or pull repository on server
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << EOF
          set -e
          if [ ! -d /home/allocento/app/.git ]; then
            mkdir -p /home/allocento/app
            cd /home/allocento/app
            git init
            git remote add origin https://github.com/${GITHUB_REPOSITORY}.git || git remote set-url origin https://github.com/${GITHUB_REPOSITORY}.git
            git fetch origin
            git checkout -f -B main origin/main
          else
            cd /home/allocento/app
            git fetch origin
            git reset --hard origin/main
            git clean -fd
          fi
          EOF

      - name: Create backend .env
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
          DB_USERNAME: ${{ secrets.DB_USERNAME }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          MAIL_PASSWORD: ${{ secrets.MAIL_PASSWORD }}
        run: |
          # Calculate the database username locally on the runner
          DB_USER="${DB_USERNAME:-$SSH_USER}"

          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << EOF
          set -e
          cd /home/allocento/app/backend
          if [ ! -f .env ]; then
            cp .env.example .env
          fi

          # Ensure key placeholders exist in .env
          if ! grep -q "^APP_KEY=" .env; then
            echo "APP_KEY=" >> .env
          fi
          if ! grep -q "^VAPID_PUBLIC_KEY=" .env; then
            echo "VAPID_PUBLIC_KEY=" >> .env
          fi
          if ! grep -q "^VAPID_PRIVATE_KEY=" .env; then
            echo "VAPID_PRIVATE_KEY=" >> .env
          fi
          if ! grep -q "^VAPID_SUBJECT=" .env; then
            echo "VAPID_SUBJECT=\"mailto:no-reply@allocento.komsiluk.org\"" >> .env
          fi

          # Securely write env variables
          sed -i '/^[[:space:]]*DB_CONNECTION=/d' .env
          echo "DB_CONNECTION=\"pgsql\"" >> .env

          sed -i '/^[[:space:]]*DB_HOST=/d' .env
          echo "DB_HOST=\"127.0.0.1\"" >> .env

          sed -i '/^[[:space:]]*DB_PORT=/d' .env
          echo "DB_PORT=\"5432\"" >> .env

          sed -i '/^[[:space:]]*DB_DATABASE=/d' .env
          echo "DB_DATABASE=\"allocento\"" >> .env

          sed -i '/^[[:space:]]*DB_USERNAME=/d' .env
          echo "DB_USERNAME=\"$DB_USER\"" >> .env

          sed -i '/^[[:space:]]*DB_PASSWORD=/d' .env
          echo "DB_PASSWORD=\"$DB_PASSWORD\"" >> .env

          sed -i '/^[[:space:]]*APP_ENV=/d' .env
          echo "APP_ENV=\"production\"" >> .env

          sed -i '/^[[:space:]]*APP_DEBUG=/d' .env
          echo "APP_DEBUG=\"false\"" >> .env

          sed -i '/^[[:space:]]*APP_URL=/d' .env
          echo "APP_URL=\"https://allocento.komsiluk.org\"" >> .env

          sed -i '/^[[:space:]]*MAIL_MAILER=/d' .env
          echo "MAIL_MAILER=\"smtp\"" >> .env

          sed -i '/^[[:space:]]*MAIL_HOST=/d' .env
          echo "MAIL_HOST=\"smtp.resend.com\"" >> .env

          sed -i '/^[[:space:]]*MAIL_PORT=/d' .env
          echo "MAIL_PORT=\"465\"" >> .env

          sed -i '/^[[:space:]]*MAIL_ENCRYPTION=/d' .env
          echo "MAIL_ENCRYPTION=\"tls\"" >> .env

          sed -i '/^[[:space:]]*MAIL_USERNAME=/d' .env
          echo "MAIL_USERNAME=\"resend\"" >> .env

          sed -i '/^[[:space:]]*MAIL_PASSWORD=/d' .env
          echo "MAIL_PASSWORD=\"$MAIL_PASSWORD\"" >> .env

          sed -i '/^[[:space:]]*MAIL_FROM_ADDRESS=/d' .env
          echo "MAIL_FROM_ADDRESS=\"no-reply@allocento.komsiluk.org\"" >> .env
          EOF

      - name: Install backend dependencies
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          composer install --no-dev --optimize-autoloader --no-interaction
          EOF

      - name: Generate keys and run backend migrations
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend

          if grep -q "^APP_KEY=$" .env; then
            php artisan key:generate --force --no-interaction
          fi

          if grep -q "^VAPID_PUBLIC_KEY=$" .env; then
            php artisan webpush:vapid --force --no-interaction
          fi

          php artisan migrate --force
          EOF

      - name: Cache backend config and routes
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/backend
          php artisan config:cache
          php artisan route:cache
          EOF

      - name: Restart backend service and queue
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          
          cd /home/allocento/app/backend
          
          # Restart the main backend service
          sudo systemctl restart allocento-backend
          
          # Gracefully restart the queue worker
          # This signals the worker to exit after its current job.
          # Since the systemd service has Restart=always, it will start right back up with the new code!
          php artisan queue:restart
          
          EOF

      - name: Create frontend environment files
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          mkdir -p /home/allocento/app/frontend/src/environments
          echo "export const environment = { production: true, apiBaseUrl: 'https://allocento.komsiluk.org/api' };" > /home/allocento/app/frontend/src/environments/environment.prod.ts
          echo "export const environment = { production: false, apiBaseUrl: 'http://localhost:8000/api' };" > /home/allocento/app/frontend/src/environments/environment.ts
          EOF

      - name: Install frontend dependencies
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/frontend
          npm ci
          EOF

      - name: Build frontend
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          cd /home/allocento/app/frontend
          npm run build:prod
          EOF

      - name: Reload Nginx
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          sudo systemctl reload nginx || echo "Nginx reload failed (likely due to sudo permissions), but static files were updated successfully."
          EOF
