name: Fix Queue Worker

on:
  workflow_dispatch:

jobs:
  fix-queue:
    runs-on: ubuntu-latest
    steps:
      - name: Start ssh-agent and add key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -p ${{ secrets.SSH_PORT }} ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: Install and Start Queue Worker
        env:
          SSH_USER: ${{ secrets.SSH_USER }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          ssh -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" << 'EOF'
          set -e
          
          echo "Kreiranje systemd servisa..."
          cat << 'SVC' > /tmp/allocento-queue.service
          [Unit]
          Description=Laravel Queue Worker
          After=network.target
          
          [Service]
          User=allocento
          Group=www-data
          Restart=always
          ExecStart=/usr/bin/php /home/allocento/app/backend/artisan queue:work --tries=3 --max-time=3600
          
          [Install]
          WantedBy=multi-user.target
          SVC
          
          echo "Instalacija servisa uz sudo privilegije..."
          sudo cp /tmp/allocento-queue.service /etc/systemd/system/allocento-queue.service
          sudo systemctl daemon-reload
          sudo systemctl enable allocento-queue
          sudo systemctl restart allocento-queue
          
          echo "Servis je uspješno pokrenut! Trenutni status:"
          sudo systemctl status allocento-queue --no-pager
          EOF
